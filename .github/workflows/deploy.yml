name: Deploy Supabase Edge Function

on:
  push:
    branches:
      - main
    # Only run when files in the edge_functions directory change
    paths:
      - 'supabase/edge_functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy gemini_proxy
        run: supabase functions deploy gemini_proxy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
